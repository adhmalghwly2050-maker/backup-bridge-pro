kind = "web"
previewPath = "/"
title = "نظام تحليل بيانات المشاريع"
version = "1.0.0"
id = "artifacts/project-management"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25074

[services.development]
run = "pnpm --filter @workspace/project-management run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-management", "run", "build" ]
publicDir = "artifacts/project-management/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25074"
BASE_PATH = "/"
